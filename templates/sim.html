<!DOCTYPE html>
<html lang="tg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>{{ scenario.emoji }} {{ scenario.title }} — SocioSim</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #090910;
  --surface: #10101a;
  --card: #13131f;
  --border: #1e1e30;
  --accent: #6c63ff;
  --accent2: #a89dff;
  --green: #4dffb4;
  --text: #f0eeff;
  --muted: #5a5a7a;
  --user-bg: #1a1a30;
  --ai-bg: #13131f;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  display: flex;
  flex-direction: column;
}

/* HEADER */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.back-btn {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 12px;
  color: var(--muted);
  font-size: 16px;
  cursor: pointer;
  flex-shrink: 0;
}
.header-info { flex: 1; min-width: 0; }
.header-title {
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 800;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.header-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
.end-btn {
  background: rgba(255,77,109,0.1);
  border: 1px solid rgba(255,77,109,0.3);
  border-radius: 10px;
  padding: 8px 12px;
  color: #ff4d6d;
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  cursor: pointer;
  flex-shrink: 0;
  white-space: nowrap;
}

/* INTRO BANNER */
.intro-banner {
  background: rgba(108,99,255,0.08);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex;
  gap: 10px;
  align-items: flex-start;
  flex-shrink: 0;
}
.intro-emoji { font-size: 20px; flex-shrink: 0; }
.intro-text { font-size: 12px; color: var(--muted); line-height: 1.5; }
.intro-text strong { color: var(--accent2); }

/* CHAT */
.chat-wrap {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  -webkit-overflow-scrolling: touch;
}

.msg {
  display: flex;
  gap: 10px;
  max-width: 85%;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.ai { align-self: flex-start; }

.msg-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
  margin-top: 2px;
}
.msg.ai .msg-avatar { background: rgba(108,99,255,0.2); border: 1px solid rgba(108,99,255,0.3); }
.msg.user .msg-avatar { background: rgba(77,255,180,0.15); border: 1px solid rgba(77,255,180,0.2); }

.msg-bubble {
  border-radius: 16px;
  padding: 11px 14px;
  font-size: 14px;
  line-height: 1.6;
}
.msg.ai .msg-bubble {
  background: var(--ai-bg);
  border: 1px solid var(--border);
  border-top-left-radius: 4px;
  color: var(--text);
}
.msg.user .msg-bubble {
  background: var(--user-bg);
  border: 1px solid rgba(108,99,255,0.25);
  border-top-right-radius: 4px;
  color: var(--text);
}

/* TYPING */
.typing { display: flex; gap: 4px; align-items: center; padding: 14px; }
.typing span {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--muted);
  animation: bounce 1.2s infinite;
}
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

/* INPUT */
.input-area {
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 12px 16px;
  display: flex;
  gap: 10px;
  align-items: flex-end;
  flex-shrink: 0;
  padding-bottom: max(12px, env(safe-area-inset-bottom));
}
.msg-input {
  flex: 1;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px 14px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  outline: none;
  resize: none;
  max-height: 120px;
  min-height: 46px;
  transition: border-color 0.2s;
  -webkit-appearance: none;
  line-height: 1.5;
}
.msg-input:focus { border-color: var(--accent); }
.send-btn {
  width: 46px; height: 46px;
  background: var(--accent);
  border: none;
  border-radius: 14px;
  color: #fff;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: opacity 0.2s, transform 0.1s;
}
.send-btn:active { transform: scale(0.93); }
.send-btn:disabled { opacity: 0.4; }

/* EVALUATION MODAL */
.eval-modal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(0,0,0,0.85);
  align-items: flex-end;
}
.eval-modal.show { display: flex; }
.eval-sheet {
  background: var(--surface);
  border-top: 1px solid var(--border);
  border-radius: 24px 24px 0 0;
  padding: 24px 20px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.eval-handle {
  width: 40px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 0 auto 20px;
}
.eval-title {
  font-family: 'Syne', sans-serif;
  font-size: 20px;
  font-weight: 900;
  text-align: center;
  margin-bottom: 6px;
}
.eval-subtitle { text-align: center; color: var(--muted); font-size: 13px; margin-bottom: 20px; }
.eval-score {
  text-align: center;
  margin-bottom: 24px;
}
.score-circle {
  width: 90px; height: 90px;
  border-radius: 50%;
  background: rgba(108,99,255,0.1);
  border: 3px solid var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 8px;
  flex-direction: column;
}
.score-num {
  font-family: 'Syne', sans-serif;
  font-size: 28px;
  font-weight: 900;
  background: linear-gradient(135deg, #6c63ff, #a89dff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
}
.score-denom { font-size: 12px; color: var(--muted); }
.eval-content {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  font-size: 14px;
  line-height: 1.8;
  color: var(--text);
  white-space: pre-wrap;
  margin-bottom: 16px;
}
.eval-loading {
  text-align: center;
  padding: 40px;
  color: var(--muted);
  font-size: 14px;
}
.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.btn-retry {
  width: 100%;
  background: var(--accent);
  border: none;
  border-radius: 14px;
  padding: 15px;
  color: #fff;
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 800;
  cursor: pointer;
  margin-bottom: 10px;
}
.btn-home {
  width: 100%;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  color: var(--muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  cursor: pointer;
  text-decoration: none;
  display: block;
  text-align: center;
}

/* DONE BANNER */
.done-banner {
  display: none;
  background: rgba(77,255,180,0.08);
  border: 1px solid rgba(77,255,180,0.2);
  border-radius: 14px;
  padding: 14px 16px;
  text-align: center;
  font-size: 13px;
  color: var(--green);
  margin: 8px 16px;
  flex-shrink: 0;
}
.done-banner.show { display: block; }
</style>
</head>
<body>

<div class="header">
  <button class="back-btn" onclick="history.back()">←</button>
  <div class="header-info">
    <div class="header-title">{{ scenario.emoji }} <span id="headerTitle">{{ scenario.title }}</span></div>
    <div class="header-sub" id="headerSub">{{ scenario.category }}</div>
  </div>
  <button class="end-btn" onclick="endConversation()" id="endBtn">⏹ Тамом</button>
</div>

<div class="intro-banner">
  <span class="intro-emoji">💡</span>
  <div class="intro-text" id="introText">
    <strong>Вазъият:</strong> {{ scenario.desc }}<br>
    Суҳбатро AI худаш тамом мекунад. Баъд баҳо мегирӣ!
  </div>
</div>

<div class="chat-wrap" id="chatWrap"></div>

<div class="done-banner" id="doneBanner">
  ✅ Суҳбат тамом шуд! Баҳоро интизор шав...
</div>

<div class="input-area" id="inputArea">
  <textarea class="msg-input" id="msgInput" placeholder="Ҷавоб бидеҳ..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
  </button>
</div>

<!-- Evaluation Modal -->
<div class="eval-modal" id="evalModal">
  <div class="eval-sheet">
    <div class="eval-handle"></div>
    <div class="eval-title">🏆 Натиҷа</div>
    <div class="eval-subtitle" id="evalSubtitle">Суҳбати шумо таҳлил шуд</div>
    <div id="evalContent">
      <div class="eval-loading">
        <div class="spinner"></div>
        AI баҳо медиҳад...
      </div>
    </div>
  </div>
</div>

<script>
const scenarioId = {{ scenario.id }};
const urlParams = new URLSearchParams(window.location.search);
let lang = urlParams.get('lang') || 'tj';

const scenario = {
  title: "{{ scenario.title }}",
  title_ru: "{{ scenario.title_ru }}",
  desc: "{{ scenario.desc }}",
  desc_ru: "{{ scenario.desc_ru }}",
  category: "{{ scenario.category }}",
  emoji: "{{ scenario.emoji }}"
};

const uiText = {
  tj: {
    placeholder: 'Ҷавоб бидеҳ...',
    intro: '<strong>Вазъият:</strong> ' + scenario.desc + '<br>Суҳбатро AI худаш тамом мекунад. Баъд баҳо мегирӣ!',
    done: '✅ Суҳбат тамом шуд! Баҳоро интизор шав...',
    evalTitle: '🏆 Натиҷа',
    evalSub: 'Суҳбати шумо таҳлил шуд',
    retry: '🔄 Боз кӯшиш кун',
    home: '← Саҳифаи асосӣ',
    end: '⏹ Тамом',
    endConfirm: 'Суҳбатро тамом кунӣ?'
  },
  ru: {
    placeholder: 'Ответь...',
    intro: '<strong>Ситуация:</strong> ' + scenario.desc_ru + '<br>Разговор AI завершит сам. После получишь оценку!',
    done: '✅ Разговор завершён! Ожидай оценку...',
    evalTitle: '🏆 Результат',
    evalSub: 'Ваш диалог проанализирован',
    retry: '🔄 Попробовать снова',
    home: '← На главную',
    end: '⏹ Завершить',
    endConfirm: 'Завершить разговор?'
  }
};

// Apply lang
document.getElementById('headerTitle').textContent = lang === 'tj' ? scenario.title : scenario.title_ru;
document.getElementById('introText').innerHTML = uiText[lang].intro;
document.getElementById('msgInput').placeholder = uiText[lang].placeholder;
document.getElementById('endBtn').textContent = uiText[lang].end;

let messages = [];
let isWaiting = false;
let isDone = false;

// Start conversation
window.addEventListener('load', () => {
  sendToAI();
});

function appendMsg(role, text) {
  const wrap = document.getElementById('chatWrap');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const avatar = role === 'ai' ? scenario.emoji : '🧑';
  div.innerHTML = `
    <div class="msg-avatar">${avatar}</div>
    <div class="msg-bubble">${text}</div>
  `;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}

function showTyping() {
  const wrap = document.getElementById('chatWrap');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typingMsg';
  div.innerHTML = `
    <div class="msg-avatar">${scenario.emoji}</div>
    <div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>
  `;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typingMsg');
  if (t) t.remove();
}

async function sendToAI() {
  isWaiting = true;
  document.getElementById('sendBtn').disabled = true;
  showTyping();

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ scenario_id: scenarioId, messages, lang })
    });
    const data = await res.json();
    removeTyping();

    if (data.error) { isWaiting = false; document.getElementById('sendBtn').disabled = false; return; }

    appendMsg('ai', data.reply);
    messages.push({ role: 'assistant', content: data.reply });

    if (data.done) {
      isDone = true;
      document.getElementById('doneBanner').textContent = uiText[lang].done;
      document.getElementById('doneBanner').classList.add('show');
      document.getElementById('inputArea').style.display = 'none';
      document.getElementById('endBtn').style.display = 'none';
      setTimeout(() => showEvaluation(), 1200);
    } else {
      isWaiting = false;
      document.getElementById('sendBtn').disabled = false;
      document.getElementById('msgInput').focus();
    }
  } catch(e) {
    removeTyping();
    isWaiting = false;
    document.getElementById('sendBtn').disabled = false;
  }
}

async function sendMessage() {
  if (isWaiting || isDone) return;
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  appendMsg('user', text);
  messages.push({ role: 'user', content: text });
  await sendToAI();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function endConversation() {
  if (messages.length < 2) return;
  if (confirm(uiText[lang].endConfirm)) {
    isDone = true;
    document.getElementById('inputArea').style.display = 'none';
    document.getElementById('endBtn').style.display = 'none';
    showEvaluation();
  }
}

async function showEvaluation() {
  const modal = document.getElementById('evalModal');
  modal.classList.add('show');
  document.getElementById('evalContent').innerHTML = `
    <div class="eval-loading">
      <div class="spinner"></div>
      ${lang === 'tj' ? 'AI баҳо медиҳад...' : 'AI оценивает...'}
    </div>`;

  try {
    const res = await fetch('/evaluate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ scenario_id: scenarioId, messages, lang })
    });
    const data = await res.json();

    // Extract score
    const scoreMatch = data.evaluation.match(/(\d+)\s*\/\s*10/);
    const score = scoreMatch ? scoreMatch[1] : '?';

    // Clean text
    const cleanText = data.evaluation.replace(/БАЛЛ:.*\n?/, '').trim();

    document.getElementById('evalContent').innerHTML = `
      <div class="eval-score">
        <div class="score-circle">
          <span class="score-num">${score}</span>
          <span class="score-denom">/10</span>
        </div>
      </div>
      <div class="eval-content">${cleanText}</div>
      <button class="btn-retry" onclick="location.reload()">${uiText[lang].retry}</button>
      <a class="btn-home" href="/">${uiText[lang].home}</a>
    `;

    document.getElementById('evalTitle').textContent = uiText[lang].evalTitle;
    document.getElementById('evalSubtitle').textContent = uiText[lang].evalSub;

  } catch(e) {
    document.getElementById('evalContent').innerHTML = `
      <div class="eval-content">${lang === 'tj' ? 'Хатогӣ рух дод' : 'Произошла ошибка'}</div>
      <button class="btn-retry" onclick="location.reload()">${uiText[lang].retry}</button>
      <a class="btn-home" href="/">${uiText[lang].home}</a>
    `;
  }
}
</script>
</body>
</html>
